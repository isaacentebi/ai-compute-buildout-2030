    post_quarter_financing: "$2.15B 6.750% Senior Secured Notes due 2031 issued for PF2 construction (post-Q3)."
    fleet:
      current_operational_mw: 100  # Polaris Forge 1 Bldg 1 (ELN-02) fully energized / RFS as of Feb 2026 per Q3 FY26 10-Q
      contracted_mw: 600  # 400 MW PF1 CoreWeave + 200 MW PF2 undisclosed hyperscaler
    sites_disclosed:
      - name: "Polaris Forge 1 (Ellendale, ND)"
        contracted_mw: 400
        anchor: CoreWeave
        contracted_usd_b: 11.0
        dedup_note: |
          CoreWeave is END-USER. PF1 400 MW is LEASED to CoreWeave.
          In this overlay, capacity attributed to CoreWeave row
          (neocloud 1) as part of CW's 850 MW operational / 3.1 GW
          contracted. HERE we record PF1 under Applied Digital for
          real-estate-ownership completeness, but mark as overlap
          against CoreWeave to prevent double-count.
      - name: "Polaris Forge 2 (ND)"
        contracted_mw: 200
        anchor: "undisclosed hyperscaler (likely Google or AWS)"
        contracted_usd_b: 5.0
    anchor_tenants:
      - name: CoreWeave
        site: "Polaris Forge 1"
      - name: "undisclosed hyperscaler"
        site: "Polaris Forge 2"
    epoch_overlap_sites: []  # not in Epoch
    # But PF1 is double-counted vs CoreWeave row:
    dedup_against_coreweave_mw: 400  # subtract from APLD incremental
    epoch_overlap_gw_buildout: 0.00
    incremental_operational_mw: 0  # all 100 MW RFS is leased to CoreWeave (already in CW's 850 MW)
    incremental_contracted_mw: 200  # only PF2 (CoreWeave dedup handled)
    evidence_tier_operational: T1  # 100 MW RFS evidenced in Q3 FY26 10-Q (but dedup'd to CoreWeave row)
    evidence_tier_contracted: T3  # PF2 hyperscaler lease is contracted; $2.15B 6.75% senior secured notes issued for PF2 construction
    realization_probability_operational: 1.00  # but counted under CoreWeave
    realization_probability_contracted: 0.78  # T3 default; APLD is public but hyperscaler undisclosed
    primary_sources:
