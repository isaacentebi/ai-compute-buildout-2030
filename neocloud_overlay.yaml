# ---------------------------------------------------------------------------
# neocloud_overlay.yaml
#
# Neocloud fleet capacity that Epoch AI's Frontier Data Centers dataset
# does NOT track. Epoch captures only 3 neocloud-adjacent sites:
#   - Fluidstack Lake Mariner, NY (68 MW current / 509 MW buildout)
#   - Coreweave Helios (0 MW current / 800 MW buildout)
#   - Crusoe Abilene Expansion (0 MW current / 941 MW buildout)
#
# The broader neocloud fleet — CoreWeave's full 43 DCs, Nebius global,
# Nscale, full Crusoe beyond Abilene, Lambda, Applied Digital, Fluidstack
# beyond Lake Mariner, Voltage Park/Lightning, Together AI, Fermi —
# is not in Epoch. This file captures it with explicit anti-double-count
# discipline.
#
# Data cutoff: 2026-04-22
# ---------------------------------------------------------------------------

metadata:
  overlay_version: "2026-04-22"
  epoch_data_cutoff: "2026-04-16"
  methodology: |
    Per-neocloud fleet inventory: operational MW, contracted MW,
    anchor-tenant attribution (who is renting), and explicit
    epoch_overlap_sites declaration so we subtract whatever Epoch
    already has.

    Anchor-tenant attribution is critical to avoid double-counting
    on the USER side: if CoreWeave has a site with Microsoft as anchor
    and that site is in Epoch under "Microsoft #speculative" user tag,
    we cannot also count it as incremental Microsoft demand via CoreWeave.

    Leaseback chains (Applied Digital → CoreWeave, TeraWulf → Fluidstack,
    Oracle → Crusoe) are handled by attributing capacity to the END-USER
    neocloud that has the operating lease, not the real-estate owner.
  sources_note: |
    Where our facts.yaml has richer numbers than online sources, use facts.yaml.
    Where primary 10-Q/10-K disclosures are available (CoreWeave CRWV,
    Nebius NBIS, Applied Digital APLD), they take precedence.

neoclouds:

  # --------------------------------------------------------------------------
  # 1. CoreWeave (NASDAQ: CRWV) — public, Microsoft anchor
  # --------------------------------------------------------------------------
  - neocloud: CoreWeave
    ticker: CRWV
    status: public
    headquarters: "Livingston, NJ, USA"
    as_of_date: "2026-02-27"  # Q4 FY25 earnings call
    mw_basis: facility       # rev-3: CoreWeave 10-K and earnings report facility power (REIT/lease convention)
    pue_assumed: 1.25        # rev-3: colo-average; CoreWeave fleet spans multiple climates
    fleet:
      current_operational_mw: 850  # EOY 2025 across 43 DCs (Q4'25 earnings)
      contracted_mw: 3100  # EOY 2025
      target_eoy_2026_mw: 1700  # live by EOY 2026
      target_2030_mw: 8100  # 3.1 + 5 GW additional by 2030
    anchor_tenants:
      - name: Microsoft
        revenue_share_2024: 0.62  # per S-1
        capacity_attribution_gw: null  # not disclosed per-customer
      - name: OpenAI
        contracted_usd_b: 22.4
      - name: Meta
        contracted_usd_b: 35.2
      - name: IBM
        contracted_usd_b: null
      - name: "merchant (other)"
    revenue_backlog_usd_b: 66.8  # FY2025 10-K, Dec 31, 2025 reference date; added 2026-04-23 per primary-source audit
    remaining_performance_obligations_usd_b: 60.7  # RPO per FY2025 10-K
    epoch_overlap_sites:
      - site: Coreweave Helios
        epoch_confidence_owner: "Coreweave #confident"
        epoch_confidence_user: "Microsoft #speculative"
        buildout_mw: 800
        buildout_by: "2029-01-01"
        notes: "Epoch's only CoreWeave site. Microsoft-speculative user."
      - site: Applied Digital Polaris Forge 1
        note: |
          NOT in Epoch, but CoreWeave LEASES 400 MW of PF1 from Applied
          Digital ($11B across 3 leases). Applied Digital is listed
          separately in this file (see row 6). Counting AD's PF1 400 MW
          AND CoreWeave's 850 MW operational would double-count because
          AD's PF1 100 MW operational is PART of CoreWeave's 850 MW.
        dedup_direction: "Attribute to CoreWeave (end-user); subtract from Applied Digital's capacity."
    epoch_overlap_gw_buildout: 0.80  # Helios only (PF1 handled via dedup in AD row)
    incremental_operational_mw: 850  # none in Epoch
    incremental_contracted_mw: 2300  # 3.1 GW contracted - 0.8 GW Helios
    incremental_target_eoy_2026_mw: 900  # 1.7 GW target - 0.8 GW Helios
    evidence_tier_operational: T1  # 850 MW directly disclosed on Q4 FY25 earnings
    evidence_tier_contracted: T3  # $60.7B RPO with IG counterparties (MSFT, OpenAI, Meta)
    realization_probability_operational: 1.00
    realization_probability_contracted: 0.82  # above T3 default; public-company RPO under IFRS disclosure
    primary_sources:
      - url: https://www.fool.com/earnings/call-transcripts/2026/02/27/coreweave-crwv-q4-2025-earnings-call-transcript/
        publisher: CoreWeave (via Motley Fool transcript)
        date: 2026-02-27
      - url: https://www.datacenterdynamics.com/en/news/coreweave-aims-to-add-5gw-more-data-center-capacity-by-2030-anticipates-capex-in-2026-to-double/
        publisher: DCD
        date: 2026-02-28
    residual_risk_flags:
      - "Applied Digital PF1 overlap handled by leaseback attribution — if AD reports PF1 separately without deducting it, double-counts."
      - "Microsoft attribution on Helios is Epoch #speculative — if it turns out Microsoft uses CoreWeave differently, anchor-tenant map shifts."

  # --------------------------------------------------------------------------
  # 2. Nebius (NASDAQ: NBIS) — public, Microsoft + Meta anchors
  # --------------------------------------------------------------------------
  - neocloud: Nebius
    ticker: NBIS
    status: public
    headquarters: "Amsterdam, Netherlands"
    as_of_date: "2026-02"  # Q4 FY25 shareholder letter
    mw_basis: facility       # rev-3: Nebius shareholder letter reports facility power
    pue_assumed: 1.20        # rev-3: GPU-first design (Finland hydropower cooling)
    audit_note: "20-F for FY2025 not yet on EDGAR as of 2026-04-23 (due 2026-04-30); re-audit 2026-05-01..05-07."
    fleet:
      current_operational_mw: 170  # >170 MW EOY 2025
      contracted_mw: 2000  # >2 GW EOY 2025
      target_eoy_2026_contracted_mw: 3000  # raised target, contracted
      target_eoy_2026_connected_mw: 1000   # connected (operational) goal per Nebius IR
    sites_disclosed:
      - "Finland (flagship)"
      - "Kansas City"
      - "Israel"
      - "Paris"
      - "Vineland, NJ"  # per later disclosure
    anchor_tenants:
      - name: Microsoft
        contracted_usd_b_through_2031: [17.4, 19.4]
      - name: Meta
        contracted_usd_b: 27.0  # up to $27B ($12B dedicated + up to $15B additional) per 6-K March 16, 2026
        contract_horizon_years: 5
        start_date: "2025-12"  # corrected 2026-04-23 per 6-K (Nov 11, 2025): first tranche deployed Dec 2025, second Feb 2026. Expansion to $27B signed March 16, 2026 — expansion deployment early 2027, but initial $3B already live.
    total_contracted_backlog_usd_b_range: [44.4, 46.4]  # MSFT 17.4-19.4 + Meta up-to-27.0; added 2026-04-23 per primary-source audit
    epoch_overlap_sites: []  # Nebius absent from Epoch
    epoch_overlap_gw_buildout: 0.00
    incremental_operational_mw: 170
    incremental_contracted_mw: 2000
    incremental_target_eoy_2026_mw: 3000
    evidence_tier_operational: T1  # 170 MW disclosed in Nebius Q4 FY25 shareholder letter
    evidence_tier_contracted: T3  # $44-46B backlog with MSFT + Meta; Meta first $3B tranche already live
    realization_probability_operational: 1.00
    realization_probability_contracted: 0.78  # T3 default
    primary_sources:
      - url: https://nebius.com/newsroom/nebius-signs-new-ai-infrastructure-agreement-with-meta
        publisher: Nebius
        date: 2026-03-16
      - url: https://www.datacenterdynamics.com/en/news/nebius-signs-3bn-deal-with-meta-says-current-available-capacity-is-sold-out-as-it-targets-25gw-by-end-of-2026/
        publisher: DCD
        date: 2025-11
    facts_yaml_refs: ["meta.commitment.nebius_2027"]
    residual_risk_flags:
      - "Meta $27B is capacity already partially live (first tranche Dec 2025, second Feb 2026) — already captured in commitments overlay row #8. Do not add GW from that fact separately; Nebius's 3 GW 2026 target already covers the capacity."

  # --------------------------------------------------------------------------
  # 3. Nscale — private, Microsoft anchor
  # --------------------------------------------------------------------------
  - neocloud: Nscale
    status: private
    headquarters: "London, UK"
    as_of_date: "2026-04"
    mw_basis: facility       # rev-3: Nscale press releases report facility MW (Microsoft Fairwater partner convention)
    pue_assumed: 1.20        # rev-3: Nordic/UK sites efficient
    fleet:
      current_operational_mw: 20  # first North Carolina site online April 2026
      contracted_mw: 1500  # ~1.5 GW stated
    sites_disclosed:
      - name: "North Carolina (first US)"
        operational_mw: 20
        anchor: merchant
      - name: "Barstow, TX"
        contracted_mw: 240
        anchor: Microsoft  # 200,000 GPU deal
        gpus: 200000
      - name: "Ward County, TX"
        contracted_mw: 240
        anchor: Microsoft
      - name: "Loughton, UK"
        contracted_mw: [50, 90]
        anchor: Microsoft  # Fairwater UK partner — SEE COMMITMENTS OVERLAY #6
        epoch_overlap_note: |
          This site is ALSO captured in compute_commitments_overlay.yaml
          row 6 (openai_microsoft_fairwater) as Fairwater Loughton.
          Do not double-count. Nscale is the operator; Microsoft is the
          user. Attribute capacity to the Fairwater row and subtract here.
      - name: "West London (Google)"
        anchor: Google  # W. London site
        contracted_mw: null
      - name: "Narvik, Norway"
        contracted_mw: null
        anchor: Microsoft  # Fairwater Narvik — SEE COMMITMENTS OVERLAY #6
        epoch_overlap_note: "Also in commitments overlay row 6. Dedup: attribute to Fairwater."
    anchor_tenants:
      - name: Microsoft
        contracted_gpus: 200000
      - name: Google
        site: "West London"
    epoch_overlap_sites: []
    epoch_overlap_gw_buildout: 0.00
    # After dedup against Fairwater commitment rows (Loughton + Narvik):
    incremental_operational_mw: 20
    incremental_contracted_mw: 900  # ~1.5 GW total MINUS ~600 MW already in Fairwater overlay (Loughton 0.1 + Narvik 0.5)
    evidence_tier_operational: T1
    evidence_tier_contracted: T4  # private co with named MSFT deals (200k GPU); sites identified; no IFRS RPO disclosure
    realization_probability_operational: 1.00
    realization_probability_contracted: 0.60  # above T4 default — MSFT IG anchor + sites named
    dedup_notes: |
      Nscale's Microsoft-anchored capacity (Loughton UK + Narvik Norway
      + Barstow TX + Ward County TX) is partly captured in
      compute_commitments_overlay row 6 (Fairwater). If Fairwater row
      already carries Narvik + Loughton as incremental, then Nscale's
      contribution here should exclude those 2 sites.
      Barstow + Ward County (480 MW Microsoft) are NOT in Fairwater
      overlay and are net-additive.
    primary_sources:
      - url: https://siliconangle.com/2025/10/15/nscale-inks-200000-gpu-data-center-contract-microsoft/
        publisher: SiliconANGLE
        date: 2025-10-15

