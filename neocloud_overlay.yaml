      - name: "Abilene, TX (NEW 900 MW Microsoft campus)"
        contracted_mw: 900
        anchor: Microsoft
        announced_date: "2026-03"
        epoch_overlap_note: |
          This appears to be Epoch's "Crusoe Abilene Expansion" row
          (Microsoft-owned, Microsoft-user, 0 MW current / 941 MW
          buildout by 2027-11-11). Close match — assume SAME SITE.
          Attribute to Epoch's Crusoe Abilene Expansion row.
      - name: "Cheyenne, WY"
        contracted_mw: 1800
        anchor: "Tallgrass / merchant"
        epoch_overlap_note: "NOT in Epoch. Fully additive."
      - name: "Norway (Oslo area)"
        operational_mw: 52
        anchor: merchant
        epoch_overlap_note: "NOT in Epoch."
      - name: "Iceland (ICE02)"
        operational_mw: 148  # Iceland total disclosed MW
        anchor: merchant
        epoch_overlap_note: "NOT in Epoch."
    anchor_tenants:
