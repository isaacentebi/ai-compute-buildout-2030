# ============================================================================
# AGGREGATE ROLLUP (computed by compile.py --with-overlay)
# ============================================================================

aggregate_rollup:
  notes: |
    Neocloud contribution to total commitment surface, net of Epoch
    and net of double-count dedup chains (AD→CW, TeraWulf→Fluidstack,
    Crusoe↔Stargate Abilene, Nscale↔Fairwater Loughton+Narvik).

  evidence_tier_rollup:
    note: |
      Six-tier partition of the 9.39 GW neocloud contribution to the
      Western horizon. T1 = directly-disclosed operational; T6 = MW
      inferred from GPU count or fleet estimate; T3/T4 = contracted
      capacity split by whether IG-counterparty RPO backs it (T3) or
      private-co named deal (T4).
    T1_operational_directly_disclosed_gw: 1.29   # CoreWeave 0.85 + Nebius 0.17 + Crusoe 0.20 + Nscale 0.02 + Lambda 0.05
    T3_firm_commercial_contract_gw: 6.48         # CoreWeave 2.30 + Nebius 2.00 + Crusoe 1.98 + Applied Digital 0.20
    T4_announced_private_co_gw: 1.42             # Nscale 0.90 + Lambda 0.32 + Together 0.20
    T6_analyst_inference_gw: 0.20                # Voltage Park 0.135 + Together operational 0.065
    total_gw: 9.39
    # Note: T3 sums 6.48 here but 7.90 in main overlay rollup because prior
    # v1 classification lumped Nscale + Lambda into "contracted" generally.
    # Per 6-tier discipline, only RPO/IFRS-backed goes to T3 (CoreWeave,
    # Nebius, Applied Digital PF2, Crusoe Cheyenne anchor). Nscale and
    # Lambda private-co deals are T4.
    probability_weighted_gw:
      # T1 × 1.00 + T3 × 0.78 + T4 × 0.58 + T6 × 0.25
      weighted: 6.42  # 1.29×1.00 + 6.48×0.78 + 1.42×0.58 + 0.20×0.25
      note: "Conservative (T1+T3 only): 7.77 GW. Full-realization: 9.39 GW."


  neocloud_operational_mw:
    coreweave: 850
    nebius: 170
    nscale: 20
    crusoe: 200
    lambda: 50
    applied_digital: 0  # dedup'd into CoreWeave
    fluidstack: 0       # Epoch captures Lake Mariner
    voltage_park: 135
    together: 65
    fermi: 0
    total_operational_ex_epoch_mw: 1490
    total_operational_ex_epoch_gw: 1.49

  neocloud_contracted_mw_ex_overlap:
    coreweave: 2300
    nebius: 2000
    nscale: 900
    crusoe: 1980
    lambda: 320
    applied_digital: 200
    fluidstack: 0       # dollar-only commitment
    voltage_park: 0
    together: 200
    fermi: 0
    total_contracted_ex_epoch_mw: 7900
    total_contracted_ex_epoch_gw: 7.90

  total_neocloud_incremental_gw: 7.90  # vs Epoch 2.25 GW (3-site sum Helios+CW Abilene Exp+Lake Mariner) already evidenced
  # Note: Applied Digital PF2 is 200 MW additional beyond CoreWeave's 3.1 GW.


# ============================================================================
# AGGREGATE ROLLUP — FACILITY BASIS (rev-3 primary)
# ============================================================================
# Parallel to aggregate_rollup above (IT-bridge); this block is the rev-3
# primary denominator. Per-row mw_basis is declared inline on each neocloud;
# IT rows are multiplied by pue_assumed to obtain facility.
#
# Basis audit (rev-3):
#   CoreWeave        facility (PUE 1.25) — 10-K facility power
#   Nebius           facility (PUE 1.20) — 10-Q facility power
#   Nscale           facility (PUE 1.20) — private-co facility disclosure
#   Crusoe           facility (PUE 1.25) — site-level facility disclosure
#   Lambda           facility (PUE 1.25) — private-co facility disclosure
#   Applied Digital  facility (PUE 1.30) — REIT facility power
#   Fluidstack       IT (PUE 1.25)       — GPU-count inferred; zero rollup contribution
#   Voltage Park     IT (PUE 1.25)       — GPU-count inferred MW
#   Together AI      IT (PUE 1.25)       — GPU-count inferred MW
#   Fermi America    facility (PUE 1.40) — permit-level aspirational; zero rollup contribution

aggregate_rollup_facility:
  notes: |
    Facility-basis neocloud contribution to the Western horizon. Rev-3
    primary denominator (matches Epoch convention). Delta vs IT-basis
    rollup is driven by the three IT-declared neocloud operators
    (Voltage Park, Together, Fluidstack): 9.49 GW facility vs 9.39 GW IT.

  evidence_tier_rollup_facility:
    note: |
      Six-tier partition of the 9.49 GW facility-basis neocloud contribution.
      T1 and T3 are facility-declared across all contributing operators
      (unchanged vs IT-basis). T4 and T6 move under facility conversion
      because Together AI (T4 contracted + T6 operational) and Voltage Park
      (T6 operational) disclose GPU-count inferred MW (IT basis).
    T1_operational_directly_disclosed_gw: 1.29   # unchanged — CoreWeave 0.85 + Nebius 0.17 + Crusoe 0.20 + Nscale 0.02 + Lambda 0.05 (all facility)
    T3_firm_commercial_contract_gw: 6.48         # unchanged — CoreWeave 2.30 + Nebius 2.00 + Crusoe 1.98 + Applied Digital 0.20 (all facility)
    T4_announced_private_co_gw: 1.47             # Nscale 0.90 facility + Lambda 0.32 facility + Together 0.20×1.25 = 0.25 facility
    T6_analyst_inference_gw: 0.25                # Voltage Park 0.135×1.25 = 0.169 + Together op 0.065×1.25 = 0.081
    total_gw: 9.49                               # vs 9.39 IT — +0.10 GW delta from IT→facility conversion
    probability_weighted_gw:
      # T1 × 1.00 + T3 × 0.78 + T4 × 0.58 + T6 × 0.25
      weighted: 7.26   # 1.29×1.00 + 6.48×0.78 + 1.47×0.58 + 0.25×0.25
      note: "Conservative (T1+T3 only): 7.77 GW facility. Full-realization: 9.49 GW facility."

