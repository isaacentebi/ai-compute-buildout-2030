    evidence_tier_operational: T1
    evidence_tier_contracted: T3  # Cheyenne 1.8 GW is permitted + anchor-contracted; Crusoe's Abilene work is already T2 in Epoch
    realization_probability_operational: 1.00
    realization_probability_contracted: 0.70  # below T3 default (0.78) — private co; no public RPO disclosure
    primary_sources:
