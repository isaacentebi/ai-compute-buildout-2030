# ============================================================================
# FACT 1 — DOWNGRADED: Anthropic-Google TPU $52B
# ============================================================================
# Was: confidence=high, single source (Google Cloud blog).
# Now: confidence=medium, notes flag double-count risk with $50B Fluidstack.
# Reason: Anthropic's own April 2026 blog frames the TPU deal as "a major
# expansion of our November 2025 commitment to invest $50 billion in
# strengthening American computing infrastructure" — $50B Fluidstack and
# $52B TPU are two sides of the same program, not additive.

facts:

  - fact_id: anthropic.commitment.google_tpu
    category: commitment
    value:
      point_estimate: 52.0
    unit: USD_billion
    as_of_date: '2026-04-06'
    confidence: medium
    source_ids:
      - anthropic_google_broadcom_20260407
      - maginative_1m_tpu
    notes: |
      Anthropic-Google TPU multi-year deal. IMPORTANT - do NOT add this figure
      to anthropic.commitment.fluidstack_jv ($50B). Anthropic's own April 2026
      blog frames the TPU deal as "a major expansion of our November 2025
      commitment to invest $50 billion in strengthening American computing
      infrastructure" - infrastructure ($50B Fluidstack) and silicon
      (TPU/Broadcom) are the two sides of the SAME program, not additive. The
      $52B dollar figure itself is secondary (Maginative analyst aggregation
      of 400K Broadcom direct + 600K Google Cloud rental); Anthropic has not
      confirmed $52B as a primary total.

  # ==========================================================================
  # NEW FACTS — Anthropic-AWS Apr 20 2026 announcement
  # ==========================================================================

  - fact_id: anthropic.commitment.aws_2026_04_rainier_5gw
    category: commitment
    value:
      point_estimate: 100.0
    unit: USD_billion
    as_of_date: '2026-04-20'
    confidence: high
    source_ids:
      - anthropic_aws_rainier_5gw_20260420
      - amazon_anthropic_5gw_20260420
    notes: |
      Anthropic committed "more than $100 billion over the next ten years on
      AWS technologies" in the April 20 2026 announcement, alongside "up to 5
      gigawatts (GW) of new capacity" and an additional $5B Amazon equity
      tranche (with up to $20B more in future tranches).

  - fact_id: anthropic.commitment.aws_2026_04_rainier_5gw_capacity
    category: commitment
    value:
      point_estimate: 5.0
      range_low: 2.5
      range_high: 5.0
    unit: gigawatts
    as_of_date: '2026-04-20'
    confidence: high
    source_ids:
      - anthropic_aws_rainier_5gw_20260420
      - amazon_anthropic_5gw_20260420
    notes: |
      Anthropic-AWS April 20 2026: "up to 5 gigawatts (GW) of new capacity"
      via Project Rainier expansion. Near-term: "nearly 1 GW total of Trainium2
      and Trainium3 capacity coming online by the end of 2026." Overlay
      reconciliation attributes 1.83 GW to Epoch-tracked Madison+Ridgeland
      sites and 3.17 GW as genuinely-new capacity (point estimate); range
      [2.50, 5.00] reflects uncertainty on whether Madison/Ridgeland and
      future New Carlisle expansion sit inside or outside the "5 GW new"
      envelope.

  # ==========================================================================
  # NEW FACTS — Sovereign-AI sidebar (UAE, Saudi, India, UK)
  # ==========================================================================

  - fact_id: sovereign_ai.commitment.microsoft_g42_uae_khazna_200mw
    category: commitment
    value:
      point_estimate: 0.20
    unit: gigawatts
    as_of_date: '2025-11-01'
    confidence: high
    source_ids:
      - microsoft_g42_uae_2025_11
    notes: |
      Microsoft-G42 Nov 2025 announcement: 200 MW expansion via Khazna Data
      Centers in UAE. Part of Microsoft's $15.2B UAE commitment ($5.5B for
      AI/cloud infra). Distinct from Stargate UAE 1 GW program (G42 + OpenAI
      + Oracle + SoftBank + Cerebras). Sovereign-AI sidebar; do not add to
      Western total.

  - fact_id: sovereign_ai.commitment.humain_amd_saudi_500mw
    category: commitment
    value:
      point_estimate: 0.50
      range_low: 0.30
      range_high: 0.70
    unit: gigawatts
    as_of_date: '2025-05-13'
    confidence: medium
    source_ids:
      - amd_humain_jv_20250513
    notes: |
      HUMAIN (Saudi PIF) + AMD + Cisco JV announced May 13, 2025: "500 MW of
      AI infrastructure deployment over the next 5 years" with $10B joint
      investment. Twin campuses Riyadh + Dammam (Phase 1 Q2 2026, 100 MW
      each). Distinct from xAI-HUMAIN 500 MW Nvidia project (Nov 2025).
      Sovereign-AI sidebar; do not add to Western total.

  - fact_id: sovereign_ai.commitment.reliance_jio_jamnagar_gwscale
    category: commitment
    value:
      point_estimate: 1.00
      range_low: 0.12
      range_high: 3.00
    unit: gigawatts
    as_of_date: '2024-08-29'
    confidence: medium
    source_ids:
      - reliance_ambani_agm_2024
      - reliance_110bn_ai_plan_20260219
    notes: |
      Reliance Industries Jio Jamnagar (Gujarat, India). Ambani at RIL 47th
      AGM (Aug 29, 2024) announced "gigawatt-scale AI-ready data centre"
      powered by Reliance Green Energy. Phase 1 120 MW online H2 2026. $110B
      AI investment plan disclosed Feb 2026. Range: low (0.12) = Phase 1 only;
      point (1.00) = Ambani "gigawatt-scale" verbatim; high (3.00) = secondary
      ceiling. Execution risk: India grid + land-acquisition materially higher
      than US/EU. Sovereign-AI sidebar; do not add to Western total.

  - fact_id: sovereign_ai.commitment.uk_culham_ai_growth_zone_500mw
    category: commitment
    value:
      point_estimate: 0.25
      range_low: 0.10
      range_high: 0.50
    unit: gigawatts
    as_of_date: '2025-01-13'
    confidence: medium
    source_ids:
      - uk_gov_ai_opportunities_action_plan_20250113
    notes: |
      UK Government AI Opportunities Action Plan (Jan 13, 2025): Culham AI
      Growth Zone, Oxfordshire. "100 MW initial expandable to 500 MW." Anchor
      tenant not yet named. UK grid-connection queue is material execution
      risk. Sovereign-AI sidebar; do not add to Western total.

