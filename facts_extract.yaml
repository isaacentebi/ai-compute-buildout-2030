    notes: |
      Sovereign-AI sidebar, 2027-2030 horizon. Sum of four non-Western Class A
      commitments: UAE (0.20), Saudi (0.50), India (1.00), UK (0.25).
      Reported separately from Western total.

  - fact_id: industry.physical_commitment_surface.class_b_chips_gw
    category: commitment
    value:
      point_estimate: 26.0
    unit: gigawatts
    as_of_date: '2026-04-22'
    confidence: high
    source_ids:
