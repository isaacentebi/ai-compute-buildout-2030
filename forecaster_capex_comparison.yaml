  divergence_it_inclusion:
    range_4x: true
    examples:
      cushman: "EXCLUDES OFCI"
      coreweave: "INCLUDES GPUs / EXCLUDES leased shell"
      epoch: "INCLUDES everything"

  outliers:
    high:
      - source: "Stargate Oracle ($300B / 4.5 GW)"
        usd_b_per_gw: 67
        likely_explanation: "Multi-year service component (compute lease economics, not pure capex)"
    low:
