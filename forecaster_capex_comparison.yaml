# ---------------------------------------------------------------------------
# forecaster_capex_comparison.yaml
#
# Cross-forecaster $/GW reconciliation for 2026-vintage AI data center capex.
# 18 sources canvassed; the basis-confusion cheat sheet at the top resolves
# what otherwise looks like a 3-5x disagreement as a unit-mismatch problem.
#
# This file is the single most load-bearing artifact for the rev-4 §2 anatomy
# section because it lets the paper land its $23-30B/GW number against the
# external literature with a clear basis declaration.
#
# Data cutoff: 2026-04-27
# ---------------------------------------------------------------------------

metadata:
  schema_version: "2026-04-27"
  data_cutoff: "2026-04-27"
  reference_vintage: 2026
  scope: "Western (US-led) hyperscale AI compute capex"
  paper_central_rev_4:
    range_low_usd_b_per_gw: 30
    range_high_usd_b_per_gw: 47
    central_usd_b_per_gw: 37
    capital_envelope_raw_horizon_51_9_gw_usd_t_low: 1.6
    capital_envelope_raw_horizon_51_9_gw_usd_t_high: 2.4
    capital_envelope_raw_horizon_51_9_gw_usd_t_central: 1.9
    basis: facility_mw
    adopted_in_paper: rev-4 2026-04-27
    rev_3_prior_figure_superseded:
      range_usd_b_per_gw: [23, 30]
      capital_envelope_usd_t: [1.2, 1.5]
      reason: |
        The rev-3 $23-30B/GW band sat at the LOW end of the credible facility-GW
        range and below all bottoms-up reconstructions. Rev-4 adopts the
        bottoms-up central as the model truth.

# ============================================================================
# THE BASIS-CONFUSION CHEAT SHEET (the rosetta stone)
# ----------------------------------------------------------------------------
# Apparent disagreements between forecasters of 3-5x in $/GW almost always
# disappear once you align on which row each is using.
# ============================================================================

basis_cheat_sheet:
  - convention_id: server_power_gw_all_in
    label: "Per server-power GW, full all-in (IT + infra + power)"
    typical_usd_b_per_gw_low: 40
    typical_usd_b_per_gw_high: 55
    used_by: ["Epoch headline ($44B)", "NVIDIA/Jensen ($50-60B)", "Stargate ($50B)"]
    note: "Smaller denominator (IT only); largest $/GW number"

  - convention_id: facility_power_gw_all_in
    label: "Per facility-power GW, full all-in"
    typical_usd_b_per_gw_low: 25
    typical_usd_b_per_gw_high: 35
    used_by: ["Epoch facility ($29-30B)", "McKinsey (~$33B)", "Bernstein (~$28B PUE-adj)", "PAPER ($23-30B)"]
    note: "Larger denominator (incl PUE overhead); paper sits at LOW end"

  - convention_id: shell_me_only_no_it
    label: "Per IT-load GW, shell + M&E only, IT excluded"
    typical_usd_b_per_gw_low: 10
    typical_usd_b_per_gw_high: 15
    used_by:
      - "Cushman & Wakefield ($11.7M/MW avg critical-load)"
      - "JLL ($11.3M/MW shell-and-core 2026)"
      - "Meta Hyperion JV ($27B / 2 GW = $13.5B/GW shell-only)"
      - "Crusoe Abilene ($15B / 1.2 GW = $12.5M/MW shell+power+cooling)"
    note: "OFCI/tenant equipment excluded. Cleanest disclosed anchor class."

  - convention_id: ai_fitout_delta_only
    label: "AI fit-out delta over standard hyperscale (incremental)"
    typical_usd_b_per_gw_low: 20
    typical_usd_b_per_gw_high: 30
    used_by: ["JLL (+$25M/MW AI fit-out)", "ConstructElements (+$20M/MW)"]
    note: "Captures liquid cooling, dense distribution, monitoring, controls"

