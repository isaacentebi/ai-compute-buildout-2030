# ============================================================================
# VERDICT ON PAPER'S $23-30B/GW
# ============================================================================

verdict_rev_4:
  summary: |
    Adopted: $30-47B/facility-GW with central $37B/GW. Capital envelope at the
    raw 51.4 GW Western 2030 horizon = .9T central, range .5-2.4T. Sits at
    the center of the external literature distribution.
  reconciliation_to_external_anchors:
    - "Crusoe Abilene $12.5M/MW (shell+power+cooling no IT): matches our facility-only-no-IT central $13.2M/MW within 5%"
    - "Meta Hyperion JV $13.5B/GW (shell+M&E only): matches our facility-only-no-IT central directly"
    - "Bernstein ~$35B/GW (IT-load basis): PUE-adjusted to ~$28B/facility-GW; below our central; under-counts BTM gas"
    - "Epoch facility-GW $29-30B: below our central; consistent with Epoch using lower-density chip mix"
    - "McKinsey derived $33B/GW: within rounding distance of our central"
    - "JLL fully-built ecosystem $45-55B/GW: aligns with our high-end at $47B"
    - "NVIDIA / Jensen $50-60B/GW (server-power basis): translates to $40-48B/facility-GW; self-interested high"
    - "Stargate ($50B/GW server-power): translates to ~$40B/facility-GW; consistent with our central given mostly all-NVIDIA build"
  basis_declaration_in_paper: |
    The paper uses convention 2 (facility-power GW, full all-in) throughout,
    with IT hardware included and BTM generation reported separately. The
    basis cheat sheet (Table 1 of §2) declares the four conventions and
    notes the convention used.

