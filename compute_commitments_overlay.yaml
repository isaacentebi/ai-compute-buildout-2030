    "2027": {h100e_per_mw: 1900, source: extrapolated, ref: "Trainium4 roadmap"}
    "2028": {h100e_per_mw: 2500, source: extrapolated, ref: "AWS roadmap extrapolation"}
    "2029": {h100e_per_mw: 3200, source: extrapolated, ref: "straight-line"}
