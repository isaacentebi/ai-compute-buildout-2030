# ---------------------------------------------------------------------------
# compute_commitments_overlay.yaml
#
# A speculative-commitment layer that sits on top of Epoch AI's Frontier
# Data Centers evidenced floor (research/data/external/epoch_data_centers/).
#
# Every row declares exactly how it nets against Epoch's evidenced sites so
# nothing is double-counted. Each row has:
#   - announcement_class:
#       A = physical-capacity-at-named-site(s)
#       B = chip procurement (deploys INTO Class-A shells, no new physical GW)
#       C = dollar / equity only (no GW, no site)
#   - announced_gw (verbatim from primary) + announced_usd_b
#   - epoch_overlap_sites (with per-site buildout MW pulled from compiled.json)
#   - epoch_overlap_gw_buildout (sum)
#   - incremental_gw_point + incremental_gw_range (with written justification)
#   - double_count_analysis prose field
#   - primary_sources with publisher + date + URL
#
# Build with: python3 research/data/external/epoch_data_centers/compile.py --with-overlay
#
# Epoch local snapshot: dataset updated 2026-04-20, retrieved 2026-04-22.
# Supplemental disclosure cutoff: 2026-04-24.
# ---------------------------------------------------------------------------

metadata:
  overlay_version: "2026-04-24"
  epoch_dataset_updated: "2026-04-20"
  epoch_retrieved: "2026-04-22"
  supplemental_disclosure_cutoff: "2026-04-24"
  author: stack-intelligence-engine
  methodology: |
    Each commitment row records the literal announcement language and then
    subtracts Epoch's evidenced buildout at overlapping sites (named or
    inferred from operator/program identity). Incremental GW = announced GW
    minus sum of overlapping Epoch site buildouts.

    Chip-procurement deals (AMD 6 GW, Broadcom 10 GW, NVIDIA 10 GW, GB200
    purchase commitments) are Class B and add ZERO physical GW to the
    commitment surface because the chips deploy INSIDE Class-A shells that
    Epoch already tracks (Stargate, Fairwater, CoreWeave, AWS). Counting
    them as additional GW triple-counts capacity.

    Dollar-only commitments (Class C) are tracked for financial reconciliation
    but contribute zero GW to the physical commitment surface.

    Epoch confidence tags (#confident, #likely, #speculative) are preserved
    on every overlap-site reference so the reader can see which subtractions
    are robust and which hinge on Epoch's own speculative attribution.

  class_definitions:
    A_physical_site: >
      Power commitment tied to specific named sites or named program
      (e.g. Project Rainier, Stargate). Subtract Epoch-evidenced buildout
      at those sites.
    B_chip_procurement: >
      Committed to buy/deploy N GW worth of chips without naming sites.
      Chips populate Class-A shells already tracked by Epoch.
      Contributes zero additional physical GW.
    C_dollar_only: >
      Dollar or equity commitment without GW or site disclosure.
      Tracked for financial reconciliation only.

# ============================================================================
# CLASS A — PHYSICAL-CAPACITY-AT-NAMED-SITES
# ============================================================================

commitments:

  # --------------------------------------------------------------------------
  # 1. Anthropic–Amazon, April 20 2026 ("5 GW of new capacity")
  # --------------------------------------------------------------------------
  - commitment_id: anthropic_aws_2026_04_20
    announcement_class: A
    announced_date: 2026-04-20
    operator: Amazon
    user: Anthropic
    program_name: "Project Rainier (expansion)"
    announcement_language:
      gw_verbatim: "up to 5 gigawatts (GW) of new capacity"
      gw_near_term_verbatim: "nearly 1 GW total of Trainium2 and Trainium3 capacity coming online by the end of 2026"
      compute_dollars_verbatim: "more than $100 billion over the next ten years on AWS technologies"
      equity_dollars_verbatim: "$5 billion in Anthropic today, with up to an additional $20 billion in the future"
      chip_generations: ["Trainium2", "Trainium3", "Trainium4", "future"]
      sites_named: []
    announced_gw: 5.0
    announced_compute_usd_b: 100.0
    announced_compute_horizon_years: 10
    announced_equity_usd_b_committed: 5.0
    announced_equity_usd_b_max: 25.0
    epoch_overlap_sites:
      - site: Amazon Madison Mega Site
        epoch_confidence_user: "Anthropic #speculative"
        epoch_confidence_project: "Project Rainier #speculative"
        buildout_mw: 819
        buildout_by: 2026-09-18
        basis_for_overlap: >
          Epoch's speculative Rainier attribution (from independent NYT +
          SemiAnalysis reporting) combined with timeline that matches
          Anthropic's "nearly 1 GW by end-2026" language.
      - site: Amazon Ridgeland
        epoch_confidence_user: "Anthropic #speculative"
        epoch_confidence_project: "Project Rainier #speculative"
        buildout_mw: 1008
        buildout_by: 2027-09-21
        basis_for_overlap: >
          Same NYT reporting that puts Madison in Rainier puts Ridgeland
          in Rainier; timeline extends through 2027, overlapping with
          Trainium3 ramp described in the announcement.
    epoch_overlap_gw_buildout: 1.83
    epoch_nonoverlap_sites:
      - site: Anthropic-Amazon New Carlisle
        reason: >
          Epoch tags both Anthropic-user and Project Rainier as #confident
          at this site (1.09 GW operational 2026-03-23, buildout 1.23 GW by
          2026-06-21). Anthropic's April 20 blog describes this as the
          "existing" Rainier deployment ("currently use over one million
          Trainium2 chips") that is distinct from the "5 GW new" commitment.
    incremental_gw_point: 3.17
    incremental_gw_range: [2.50, 5.00]
    incremental_gw_facility_point: 3.80   # rev-3: IT 3.17 × PUE 1.20
    incremental_gw_facility_range: [3.00, 6.00]   # rev-3: IT × PUE 1.20
    evidence_tier: T4  # announced site-level plan; near-term 1 GW anchors the floor
    realization_probability: 0.72  # override above T4 default 0.58 — 1 GW near-term is higher-confidence than 5 GW ceiling
    incremental_gw_reasoning: |
      Low bound (2.50 GW): Madison + Ridgeland buildout (1.83 GW) fully
      subsumed by the announcement's near-term language, AND ~0.7 GW of
      the residual is absorbed by New Carlisle expansion beyond Epoch's
      current 1.23 GW buildout (Amazon has acquired adjacent land in
      St. Joseph County per local reporting that would extend New
      Carlisle well beyond the currently-permitted envelope). This is
      the "maximum re-packaging" case: most of the 5 GW is refreshing
      capacity already in the Rainier pipeline.
      High bound (5.00 GW): strict reading of "new" in the announcement
      excludes Madison/Ridgeland as "existing permitted Rainier" (they
      began land-clearing in 2023-2024, pre-announcement), making the
      full 5 GW genuinely net-new (implying ~3 new unidentified sites).
      Point estimate (3.17 GW): Madison + Ridgeland subsumed (Epoch's
      own speculative attribution matches the announcement's near-term
      timeline), residual ~3 GW assumed to be genuinely new sites not
      yet publicly identified.
    confidence: low  # (Epoch-style: #speculative)
    gw_disclosed_verbatim: true
    site_level_overlap_known: partial
    primary_sources:
      - url: https://www.anthropic.com/news/anthropic-amazon-compute
        publisher: Anthropic
        date: 2026-04-20
        title: "Anthropic and Amazon expand collaboration for up to 5 gigawatts of new compute"
      - url: https://www.aboutamazon.com/news/company-news/amazon-invests-additional-5-billion-anthropic-ai
        publisher: Amazon
        date: 2026-04-20
        title: "Amazon and Anthropic expand strategic collaboration"
    facts_yaml_refs: []  # new fact — needs to be added to anthropic.yaml
    residual_risk_flags:
      - "Madison + Ridgeland may be classified by Anthropic as 'existing Rainier' (not 'new') — would push incremental to 5.0 GW."
      - "3.17 GW point estimate implies ~3 additional unidentified sites of ~1 GW scale; none publicly named yet."
      - "Portion dependent on Trainium4 chip availability (chips 'not currently available')."
    double_count_analysis: |
      The announcement's 5 GW is Anthropic's self-described "new capacity"
      on top of the existing Rainier deployment at New Carlisle (Epoch:
      1.09 GW operational pre-announcement). Epoch had already flagged
      Madison County MS and Ridgeland MS as #speculative Rainier (based
      on NYT + SemiAnalysis reporting from before the announcement); their
      combined 1.83 GW buildout aligns tightly with the announcement's
      "nearly 1 GW by end of 2026" tranche. Subtracting those yields
      3.17 GW of incremental capacity at sites not yet in Epoch's dataset.
      New Carlisle is intentionally excluded from the subtraction because
      Anthropic's own framing treats it as the pre-existing program.

  # --------------------------------------------------------------------------
  # 2. Anthropic–Fluidstack $50B JV (Nov 12 2025)
  # --------------------------------------------------------------------------
  - commitment_id: anthropic_fluidstack_2025_11_12
    announcement_class: A
    announced_date: 2025-11-12
    operator: Fluidstack
    user: Anthropic
    program_name: "$50B American AI Infrastructure (Fluidstack-built)"
    announcement_language:
      gw_verbatim: null  # no GW figure in primary
      compute_dollars_verbatim: "$50 billion investment in American computing infrastructure, building data centers with Fluidstack in Texas and New York"
      timeline_verbatim: "sites coming online throughout 2026"
      chip_generations: []  # NOT disclosed in primary; agent research confirms
      sites_named: ["Texas (unspecified)", "New York (unspecified)"]
    announced_gw: null
    announced_usd_b: 50.0
    announced_compute_horizon_years: null  # not disclosed
    epoch_overlap_sites:
      - site: Fluidstack Lake Mariner
        epoch_confidence_user: "Anthropic #likely (Fluidstack portion Bldgs 3-5)"
        epoch_confidence_owner: "Fluidstack #confident"
        buildout_mw: 441  # Bldgs 3-5 Anthropic-attributable portion; Bldgs 1-2 (68 MW current) are G42
        buildout_by: 2027-03-31
        basis_for_overlap: >
          Epoch's Notes field explicitly states "Our sources point to
          Fluidstack's buildings serving Google TPUs for Anthropic" at
          Buildings 3-5 (440 MW). Lake Mariner, NY is one of the NY sites
          described in the $50B announcement.
    epoch_overlap_gw_buildout: 0.44
    incremental_gw_point: null  # no GW figure in announcement to subtract from
    incremental_usd_b_point: 50.0
    incremental_usd_b_range: [50.0, 50.0]
    evidence_tier: T5  # dollar-only envelope; GW unquantified in primary source
    realization_probability: 0.40  # above T5 default 0.32 — Lake Mariner portion is physically evidenced
    incremental_gw_reasoning: |
      Primary announcement discloses no GW figure. Inferring physical
      GW from the $50B dollar figure requires an assumed $/GW build
      cost (Epoch uses ~$30B/GW implied by its capex figures), which
      would imply ~1.5-2 GW total. Instead we carry the $50B as the
      authoritative commitment surface and flag Epoch's 0.44 GW at
      Lake Mariner as partial overlap.
    confidence: medium  # (Epoch-style: #likely)
    gw_disclosed_verbatim: false
    site_level_overlap_known: partial
    primary_sources:
      - url: https://www.anthropic.com/news/anthropic-invests-50-billion-in-american-ai-infrastructure
        publisher: Anthropic
        date: 2025-11-12
      - url: https://www.fluidstack.io/about-us/blog/fluidstack-selected-by-anthropic-to-deliver-custom-data-centers-in-the-us
        publisher: Fluidstack
        date: 2025-11-12
    facts_yaml_refs: ["anthropic.commitment.fluidstack_jv"]
    residual_risk_flags:
      - "Primary source does not name Lake Mariner; Epoch's attribution is inference-chain."
      - "Other TX + NY sites unnamed — if they come online and are added to Epoch, those rows will need to be deducted from this commitment's incremental envelope."
      - "Material overlap with anthropic_google_broadcom below — these are infrastructure ($) + silicon (chips) sides of the same physical program, not additive."
    double_count_analysis: |
      The $50B is Anthropic's infrastructure commitment delivered through
      Fluidstack. The subsequent Anthropic-Google-Broadcom TPU deal
      (Oct 2025 + April 2026) is described by Anthropic itself as "a
      major expansion of our November 2025 commitment to invest $50 billion"
      — meaning the $50B is the infrastructure vehicle and the Google
      TPU/Broadcom silicon commitment is the chips flowing into those
      shells, NOT additive. Lake Mariner is the only currently-evidenced
      site. The overlay treats $50B as the dollar commitment and leaves
      GW unquantified; the TPU/Broadcom row is Class B (chip procurement)
      with zero incremental GW to avoid double-count.

