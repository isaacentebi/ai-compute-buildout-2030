# ============================================================================
# CHIP DENSITY ASSUMPTIONS (A.5) — H100e per MW per family per year
# ============================================================================
# Per-family / per-year H100e density. disclosed = primary-source TFLOPS +
# TDP; extrapolated = roadmap-only or analyst inference. The three silicon-
# uplift scenarios below (conservative / base / aggressive) scale the
# baseline to produce the 60M / 78M / 110M H100e envelope cited in §4D.
# ============================================================================

chip_density_assumptions:
  nvidia:
    "2024": {h100e_per_mw: 1050, source: disclosed, ref: "NVIDIA H100/H200 datasheet"}
    "2025": {h100e_per_mw: 1400, source: disclosed, ref: "Blackwell B200 launch specs"}
    "2026": {h100e_per_mw: 1900, source: disclosed, ref: "B300 Ultra + GB300 launch"}
    "2027": {h100e_per_mw: 2500, source: extrapolated, ref: "Vera Rubin pre-launch roadmap"}
    "2028": {h100e_per_mw: 3200, source: extrapolated, ref: "Rubin Ultra projection"}
    "2029": {h100e_per_mw: 4000, source: extrapolated, ref: "Feynman roadmap extrapolation"}
    "2030": {h100e_per_mw: 5000, source: extrapolated, ref: "straight-line NVIDIA curve"}
  tpu:
    "2024": {h100e_per_mw: 800, source: disclosed, ref: "TPU v5p datasheet"}
    "2025": {h100e_per_mw: 1000, source: disclosed, ref: "TPU v6 Trillium datasheet"}
    "2026": {h100e_per_mw: 1300, source: disclosed, ref: "TPU v7 Ironwood launch"}
    "2027": {h100e_per_mw: 1700, source: extrapolated, ref: "TPU v8 roadmap"}
    "2028": {h100e_per_mw: 2200, source: extrapolated, ref: "TPU v9 projection"}
    "2029": {h100e_per_mw: 2800, source: extrapolated, ref: "Google internal roadmap leak"}
    "2030": {h100e_per_mw: 3500, source: extrapolated, ref: "extrapolation"}
