      - site: Fluidstack Lake Mariner
        epoch_confidence_user: "Anthropic #likely (TPU for Anthropic per Epoch Notes)"
        buildout_mw: 441  # Bldgs 3-5 already accounted in anthropic_fluidstack above
        basis_for_overlap: "SAME physical site as row 2 (anthropic_fluidstack). Do not double-count."
    epoch_overlap_gw_buildout: 0.00  # already counted under anthropic_fluidstack
    incremental_gw_point: 0.00
    incremental_gw_range: [0.00, 0.00]
    incremental_gw_facility_point: 0.00   # rev-3: Class B chip procurement; 0 × PUE = 0
    incremental_gw_facility_range: [0.00, 0.00]
    evidence_tier: T4  # announced chip procurement (Class B); deploys into Class A shells; 0 incremental GW
    realization_probability: 0.65  # above T4 default — Broadcom CEO confirmed 3.5 GW XPU on earnings call
    incremental_gw_reasoning: |
      Anthropic's April 2026 blog explicitly frames this as an "expansion
      of our November 2025 $50 billion commitment" — i.e. this is the
      silicon flowing into Fluidstack-built infrastructure that row 2
      (anthropic_fluidstack_2025_11_12) already tracks at the
      infrastructure-dollar level. Counting both as additional physical
      GW would double-count the same physical capacity.

      The TPU ramp (1 GW in 2026 + multi-GW 2027+) is the chip-deployment
      schedule onto the shells. If Fluidstack reveals additional sites
      beyond Lake Mariner, they'll be added to the Class-A floor under
      anthropic_fluidstack's envelope — not as separate Class-B chip rows.
    confidence: medium  # (Epoch-style: #likely)
    gw_disclosed_verbatim: true  # primary says "well over a gigawatt"
    site_level_overlap_known: partial
    primary_sources:
      - url: https://www.anthropic.com/news/expanding-our-use-of-google-cloud-tpus-and-services
        publisher: Anthropic
        date: 2025-10-23
      - url: https://www.googlecloudpresscorner.com/2025-10-23-Anthropic-to-Expand-Use-of-Google-Cloud-TPUs-and-Services
        publisher: Google Cloud
        date: 2025-10-23
      - url: https://www.anthropic.com/news/google-broadcom-partnership-compute
        publisher: Anthropic
        date: 2026-04-07
    facts_yaml_refs: ["anthropic.commitment.google_tpu"]
    residual_risk_flags:
      - "$52B value in facts.yaml is NOT primary-sourced (likely Mizuho analyst estimate). Consider flagging or removing."
      - "3.5 GW 2027+ figure is SEC-secondary, not primary Anthropic/Google."
      - "If TPU chips deploy OUTSIDE Fluidstack shells (e.g., direct into Google's own sites), a portion becomes additive Class-A at new locations."
    double_count_analysis: |
      This deal is the chip/silicon complement to anthropic_fluidstack
      ($50B infrastructure). Anthropic's April 2026 blog is explicit
      that the two are sides of the same commitment. Treating both as
      separate additive GW would triple-count: once as $ infrastructure,
      once as chips, once again against Lake Mariner's Epoch buildout.
      Correct accounting: $50B = infrastructure envelope; TPU deal = the
      silicon flowing into it; Lake Mariner (441 MW Anthropic-attributable)
      = the Epoch-evidenced floor underneath both.

