# ============================================================================
# EXPLICITLY EXCLUDED (canvassed, primary sources do not support inclusion)
# ============================================================================
# Documented here so future readers can see the canvas was wide.
# Each entry has: what was searched, what primary source says, why excluded.

excluded_with_reason:

  - candidate: apple_private_cloud_compute
    what_was_checked: "Apple's Private Cloud Compute (PCC) datacenter buildout for Apple Intelligence."
    primary_findings: |
      Apple newsroom (Oct 23 2025) confirms Houston server manufacturing
      plant and expansion at existing iCloud sites (Maiden NC, Waukee IA,
      Prineville OR, Mesa AZ, Reno NV). Apple does NOT disclose any MW
      figure for PCC capacity in any press release, 10-K, or earnings
      call. PCC runs on Apple Silicon (M-series), not NVIDIA training gear.
    primary_source: "https://www.apple.com/newsroom/in-the-loop/2025/10/shipping-apples-american-made-advanced-servers/"
    exclusion_reason: "No disclosed MW; merged with consumer iCloud shells that Epoch's frontier-AI methodology would not tag as AI sites."

  - candidate: oracle_oci_ex_stargate
    what_was_checked: "Oracle OCI AI capacity separate from its Stargate role."
    primary_findings: |
      Oracle's Oct 14 2025 release ("OCI Zettascale10") anchors the
      flagship at Abilene (Stargate). Wisconsin-Vantage site is also
      Stargate (OpenAI/SoftBank Sep 24 2025). Oracle's $553B RPO (Q3 FY26)
      implies capacity beyond Stargate, but no ex-Stargate AI sites are
      named in primary sources.
    primary_source: "https://www.oracle.com/news/announcement/ai-world-oracle-unveils-next-generation-oci-zettascale10-cluster-for-ai-2025-10-14/"
    exclusion_reason: "Named Oracle AI sites (Abilene, Wisconsin) are inside Stargate and already counted. Flag $553B RPO implied capacity for separate analysis once site-naming disclosures appear."

  - candidate: tesla_cortex_dojo
    what_was_checked: "Tesla Cortex training cluster at Gigafactory Texas; Dojo supercomputer."
    primary_findings: |
      Q4 2024 Tesla shareholder letter confirms ~50k H100 at Cortex (Giga
      Texas) + 16k H200 expansion (Q2 2025). Buffalo $500M supercomputer
      commitment (Aug 2025). Dojo team disbanded Aug 2025. Tesla has NOT
      disclosed MW for Cortex in any IR material. The "130 MW at launch,
      500 MW by 2026" figure is secondary (Tom's Hardware citing utility
      filings).
    primary_source: "https://www.tesla.com/en_eu/ns_videos/2024-Q4-update.pdf"
    exclusion_reason: "No Tesla-primary MW disclosure. Cortex may or may not be captured in Epoch's Austin coverage under Giga Texas permit footprint."
    flag_for_followup: "Check Epoch's Austin-area site list for Giga Texas tagging."

  - candidate: cohere_deepmind_physical
    what_was_checked: "Whether Cohere or DeepMind-UK operate named physical AI datacenters."
    primary_findings: |
      Cohere uses Oracle OCI + Google Cloud contractual capacity, no
      owned physical shells. DeepMind-UK is a research org participating
      in Culham AI Growth Zone as advisor, not site operator.
    primary_source: null
    exclusion_reason: "No owned physical buildouts in primary sources."

  - candidate: digital_realty_equinix_qts_merchant
    what_was_checked: "Whether merchant co-location operators (DLR, EQIX, QTS, Aligned, Apollo-owned) own AI-specific shells beyond what hyperscalers have already leased."
    primary_findings: |
      DLR Q1 2025 supplemental shows 499 MW Americas development pipeline,
      79% leased. Equinix xScale Hampton GA 240 MW partially pre-leased.
      Primary filings do NOT break out merchant-AI (pre-leased to
      neocloud/enterprise) vs. hyperscaler-leased vs. general cloud.
    primary_source: "https://www.spglobal.com/market-intelligence/en/news-insights/articles/2025/6/digital-realty-equinix-ramp-up-datacenters-as-ai-drives-demand-90542889"
    exclusion_reason: |
      STRUCTURAL DOUBLE-COUNT RISK. These wholesalers are the physical
      SHELL for capacity already counted under hyperscalers and neoclouds.
      Any MW we added under DLR/EQIX label would double-count. Disclosed
      merchant-AI-specific MW is not available in primary filings.
    flag_for_followup: "If DLR/EQIX begin breaking out merchant-AI-leased MW separately, this exclusion may need revisiting."

  - candidate: eurohpc_6_new_ai_factories
    what_was_checked: "EuroHPC's Oct 10 2025 announcement of 6 additional AI Factories (Czechia, Lithuania, Netherlands, Poland, Romania, Spain)."
    primary_findings: |
      EuroHPC press release confirms 6 new AI Factories but does NOT
      disclose MW per site.
    primary_source: "https://www.eurohpc-ju.europa.eu/eurohpc-ju-selects-six-additional-ai-factories-expand-europes-ai-capabilities-2025-10-10_en"
    exclusion_reason: "No MW per site disclosed in primary."
    flag_for_followup: "Revisit once per-site MW disclosed in follow-on procurement tenders."

  - candidate: mistral_bruyeres_le_chatel
    what_was_checked: "Mistral's Bruyères-le-Châtel (Paris) datacenter, €722M debt financing, 13,800 GB300 GPUs."
    primary_findings: |
      Mistral's press release confirms 44 MW total Mistral fleet.
      Bruyères-le-Châtel is <100 MW at present.
    primary_source: "https://mistral.ai/news/mistral-compute"
    exclusion_reason: "Below our Class A threshold (<100 MW). Flagged for visibility but not added to the incremental rollup."

# ============================================================================
# AGGREGATE TOTALS — v3, computed by hand against Epoch snapshot retrieved 2026-04-22
# ============================================================================
# These are not a script output. Each number is the sum of its inputs above,
# written out longhand below so the arithmetic can be audited line-by-line.
# If an input row changes, update the corresponding sum here.
#
# For a spreadsheet-form view of just the per-row incrementals, see:
#   research/data/external/compute_commitments_totals.csv
# ============================================================================

totals:

  # --------------------------------------------------------------------------
  # Six-tier evidence framework rollup — see CONFIDENCE_DECOMPOSITION.md
  # --------------------------------------------------------------------------
  # Each commitment row (Class A, B, C, and each neocloud row) carries an
  # evidence_tier field T1|T2|T3|T4|T5|T6 and a realization_probability.
  # The tier defaults are: T1=1.00, T2=0.88, T3=0.78, T4=0.58, T5=0.32,
  # T6=0.25 (midpoints of the plan-specified ranges). Individual rows can
  # override via the realization_probability field (e.g. anthropic_aws
  # at 0.72; reliance_jio at 0.20).
  # --------------------------------------------------------------------------
  evidence_tier_rollup_western:
    T1_operational:
      gw: 6.52                         # true IT-load bridge: facility T1 7.56 / blended PUE 1.16
      components: {facility_t1_gw: 7.56, pue_bridge: 1.16}
      realization_probability_default: 1.00
    T2_physically_evidenced:
      gw: 10.72                        # Epoch facility 11.62 / 1.16 + Fairwater IT 0.70
      components: {epoch_EOT_2026_2027_it: 10.02, fairwater_international_it: 0.70}
      realization_probability_default: 0.88
    T3_firm_commercial:
      gw: 6.45                         # neocloud facility commitments divided by row-level PUE
      components: {neocloud_contracted_it: 6.45}
      realization_probability_default: 0.78
    T4_announced_site_plan:
      gw: 14.04                        # Epoch facility 12.61 / 1.16 + Anthropic-AWS IT 3.17
      components: {epoch_EOT_2028_it: 10.87, anthropic_aws_incremental_it: 3.17}
      realization_probability_default: 0.58
    T5_loi_or_stretch:
      gw: 5.95
      components:
        epoch_speculative_and_2029_2030_it: 2.21
        anthropic_azure_it: 1.00
        meta_hyperion_stretch_it: 2.74
      realization_probability_default: 0.32
    T6_analyst_inference:
      gw: 0.26
      components:
        xai_colossus2_residual: 0.06
        voltage_park_inferred: 0.135
        together_inferred: 0.065
      realization_probability_default: 0.25
    total_gw_announced: 43.93
    total_gw_probability_weighted: 31.09
    total_gw_conservative: 23.68  # T1 + T2 + T3 only, true IT-load bridge
    total_gw_full_realization: 46.70  # arithmetic ceiling, true IT-load bridge

  # --------------------------------------------------------------------------
  # Six-tier framework rollup — FACILITY BASIS (rev-3 primary denominator)
  # --------------------------------------------------------------------------
  # Parallel to evidence_tier_rollup_western above (true IT-load bridge). This block
  # is the rev-3 primary denominator, matching Epoch's Frontier Data Centers
  # convention (facility power = GPUs + cooling + lighting + losses).
  #
  # IT-declared rows are multiplied by pue_assumed to obtain facility:
  #   anthropic_aws           IT × 1.20 (3.17 → 3.80 GW facility)
  #   anthropic_azure         IT × 1.18 (1.00 → 1.18 GW facility)
  #   openai_microsoft_fairwater IT × 1.15 (0.70 → 0.805 GW facility)
  #   meta_hyperion_prometheus   IT × 1.10 (2.74 → 3.014 GW facility)
  #   xai_colossus2_full      IT × 1.30 (0.06 → 0.078 GW facility)
  #   voltage_park_inferred   IT × 1.25 (0.135 → 0.169 GW facility)
  #   together_inferred       IT × 1.25 (0.065 → 0.081 GW facility)
  #   together_contracted     IT × 1.25 (0.20 → 0.25 GW facility)
  # Facility-declared rows pass through 1:1 for facility; the IT-load bridge
  # divides them by row-level PUE in the sibling block above.
  # --------------------------------------------------------------------------
  evidence_tier_rollup_western_facility:
    T1_operational:
      gw: 7.56                         # unchanged — epoch_current 6.27 (facility) + neocloud_directly_disclosed 1.29 (all facility-declared per A.3)
      components: {epoch_current: 6.27, neocloud_directly_disclosed: 1.29}
      realization_probability_default: 1.00
    T2_physically_evidenced:
      gw: 12.425                       # epoch_EOT_2026_2027 11.62 (facility) + fairwater_international 0.70×1.15 = 0.805
      components: {epoch_EOT_2026_2027: 11.62, fairwater_international: 0.805}
      realization_probability_default: 0.88
    T3_firm_commercial:
      gw: 7.95                         # neocloud_contracted facility (7.90 IT + 0.05 delta from Together 200→250)
      components: {neocloud_contracted: 7.95}
      realization_probability_default: 0.78
    T4_announced_site_plan:
      gw: 16.41                        # epoch_EOT_2028 12.61 (facility) + anthropic_aws_incremental 3.17×1.20 = 3.80
      components: {epoch_EOT_2028: 12.61, anthropic_aws_incremental: 3.80}
      realization_probability_default: 0.58
    T5_loi_or_stretch:
      gw: 6.754                        # epoch_speculative_tagged 1.49 + epoch_EOT_2029_2030 1.07 + anthropic_azure 1.00×1.18 = 1.18 + meta_hyperion_stretch 2.74×1.10 = 3.014
      components:
        epoch_speculative_tagged: 1.49
        epoch_EOT_2029_2030: 1.07
        anthropic_azure: 1.18
        meta_hyperion_stretch: 3.014
      realization_probability_default: 0.32
    T6_analyst_inference:
      gw: 0.328                        # xai_colossus2_residual 0.06×1.30 = 0.078 + voltage_park_inferred 0.135×1.25 = 0.169 + together_inferred 0.065×1.25 = 0.081
      components:
        xai_colossus2_residual: 0.078
        voltage_park_inferred: 0.169
        together_inferred: 0.081
      realization_probability_default: 0.25
    total_gw_announced_facility: 51.427               # 7.56 + 12.425 + 7.95 + 16.41 + 6.754 + 0.328
    total_gw_non_stretch_facility: 44.673             # announced - T5 (replaces retired "bear" label)
    total_gw_conservative_facility_raw: 27.935        # T1 + T2 + T3 raw facility
    total_gw_conservative_facility_probweighted: 21.695  # T1×1.00 + T2×0.88 + T3×0.78 = 7.56 + 10.934 + 6.201
    total_gw_probability_weighted_facility: 36.456    # Σ tier_gw_facility × tier_default_prob across all six tiers
    total_gw_full_realization_facility: 54.724        # arithmetic ceiling from facility range, excluding sovereign xAI-HUMAIN Saudi
    basis_note: |
      rev-3 primary denominator. IT-load-equivalent capacity available in
      evidence_tier_rollup_western (sibling block above) as secondary bridge.
      Raw announced facility 51.427 GW vs 43.93 GW IT-load equivalent under
      row-level PUE assumptions. xAI-HUMAIN Saudi is sovereign sidebar, not
      Western.

  # --------------------------------------------------------------------------
  # Horizon A: operational TODAY (2026-Q2 snapshot)
  # --------------------------------------------------------------------------
  operational_today_2026_q2:
    total_gw: 7.81                     # Facility basis including T6-inferred operational/neocloud capacity. Tier-clean T1 facility remains 7.56 GW.
    components:
      epoch_current_gw: 6.27           # Revised 2026-04-24: was 6.67; Stargate Abilene -0.40 GW per Epoch 2026-04-22 (600 MW milestone pushed to late May; Oracle post confirms ~200 MW operational April 22)
      neocloud_ex_epoch_op_gw: 1.54    # facility basis; GPU-count-inferred Voltage/Together converted by PUE
    uncertainty: "Low. Evidenced by satellite imagery, permits, 10-Qs. 2026-04-24 revision: Stargate Abilene 400 MW moved from operational to under-construction (T1 -> T2) per Epoch 2026-04-22 changelog."
    epoch_capex_to_date_usd_b: 210.6   # Epoch's capex_usd_b_current
    last_updated: 2026-04-24
    changelog:
      - "2026-04-24: facility total_gw 8.21 -> 7.81 (Stargate Abilene operational revised 600 MW -> 200 MW per Epoch 2026-04-22)"

  # --------------------------------------------------------------------------
  # Horizon B: Western full-buildout (2027-2030, per announced timelines)
  # --------------------------------------------------------------------------
  # Western scope = Session 2's capex-revenue denominator (US/EU labs +
  # hyperscalers + Western neoclouds). Sovereign-AI is reported separately
  # below so it doesn't get tangled into Session 2's Western ratios.
  western_horizon_2027_2030:
    total_gw_point: 43.93
    total_gw_range: [39.16, 46.70]
