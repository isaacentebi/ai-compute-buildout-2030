chip_density_scenarios:
  description: |
    Three silicon-uplift scenarios scale the 51.4 GW facility Western 2030 horizon
    into an H100e-equivalent envelope. See §4D in the paper.
  conservative:
    description: "Hold 2026 H100e/MW density constant through 2030 (no post-Rubin gains assumed)"
    total_h100e_2030_m: 60
    implied_per_mw_blend_2030: 1185  # 60M / 51.4 GW = 1167 H100e/facility-MW
  base:
    description: "Current published roadmap extrapolations (NVIDIA Rubin + Rubin Ultra, TPU v8, Trainium 4, MI450)"
    total_h100e_2030_m: 78
    implied_per_mw_blend_2030: 1541  # 78M / 51.4 GW = 1517 H100e/facility-MW
  aggressive:
    description: "Straight-line extension of observed per-family curves to 2030 (Feynman / v9 / MI500 / MTIA v4)"
    total_h100e_2030_m: 110
    implied_per_mw_blend_2030: 2174  # 110M / 51.4 GW

# ============================================================================
# STRESS SCENARIOS (A.8) — downside, upside, and correlated states
# ============================================================================

stress_scenarios:
  description: |
    Each scenario names its transmission mechanism, affected
    commitment_ids, quantitative deltas (GW, capex, H100e),
    counterparty exposure concentrations, and a probability.
    The Monte Carlo applies a simple mixture architecture: a systemic
    infrastructure-stress state can replace independent A+B+C draws;
    lab-revenue / RPO stress can raise the probability of neocloud
    financing stress; upside scenarios are sampled separately. U4 affects
    H100e only and does not move facility-power GW.

  systemic_infrastructure_stress:
    name: "Systemic infrastructure stress"
    transmission: "Correlated Stargate delay + neocloud spread stress + grid queue stress"
    gw_delta_2030: -10.5
    capex_delta_usd_b: -300.0
    h100e_delta_million: -25.0
    probability_assigned: 0.15
    monte_carlo_rule: "If this state fires, do not separately fire scenarios A, B, or C; still allow D, E, F, and upside states."

  scenario_A_openai_stargate_slip_12mo:
    name: "Stargate 12-month slip across Abilene Phase 3+ / Shackelford / NM"
    transmission: "Chip supply + grid interconnection delays at scale across Stargate's outer sites"
    affected_commitment_ids: [openai_stargate_aggregate, openai_microsoft_fairwater, openai_aws_38b_to_100b]
    gw_delta_2030: -3.5
    capex_delta_usd_b: -120.0
    h100e_delta_million: -8.0
    counterparty_exposure_affected: [Oracle, Microsoft, CoreWeave, Crusoe, SoftBank, MGX]
    probability_assigned: 0.30

  scenario_B_neocloud_spread_widen_300bps:
    name: "Neocloud debt-spread widening by 300 bps"
    transmission: "CoreWeave $60B RPO financing constraints + Nebius $27B rollout pacing"
    affected_commitment_ids: [] # neocloud overlay, not main overlay
    affected_neocloud_ids: [CoreWeave, Nebius, Applied_Digital, Crusoe]
    gw_delta_2030: -2.0
    capex_delta_usd_b: -60.0
    h100e_delta_million: -4.0
    counterparty_exposure_affected: [CoreWeave, Nebius, Applied Digital, Crusoe, Lambda]
    probability_assigned: 0.25
    monte_carlo_rule: "If no systemic stress and no lab-revenue stress, conditional probability is 0.118. If lab-revenue stress fires, conditional probability is 0.60."

  scenario_C_grid_ercot_miso_pjm_slip_24mo:
    name: "Grid interconnection 24-month slip across ERCOT / MISO / PJM"
    transmission: "Utility queue saturation + transformer supply; ERCOT GS-1 study backlog; MISO MTEP delays"
    affected_commitment_ids:
      - openai_stargate_aggregate   # Abilene + Shackelford + Milam in ERCOT
      - openai_microsoft_fairwater   # WI in MISO
      - meta_hyperion_prometheus     # Richland Parish in MISO-South
      - anthropic_aws_2026_04_20     # Madison + Ridgeland in MISO-South
      - xai_colossus2_full            # MLGW / MISO
    gw_delta_2030: -8.0
    capex_delta_usd_b: -180.0
    h100e_delta_million: -18.0
    counterparty_exposure_affected: [broad — xAI, Meta, Stargate, OpenAI, Anthropic]
    probability_assigned: 0.40
    note: "Highest-probability scenario. Grid is the single largest systemic constraint."

  scenario_D_chip_nextgen_slip_2q:
    name: "NVIDIA Rubin / TPU v8 / Trainium 4 two-quarter slip"
    transmission: "TSMC capacity or packaging bottleneck pushes all leading-edge AI chips right"
    affected_commitment_ids: [openai_stargate_aggregate, openai_nvidia_100b_loi, anthropic_aws_2026_04_20, anthropic_google_broadcom_tpu]
    gw_delta_2030: -1.5         # chips slip but shells still built; H100e density drops
    capex_delta_usd_b: -40.0
    h100e_delta_million: -12.0
    counterparty_exposure_affected: [NVIDIA, TSMC, Broadcom, Google, AWS]
    probability_assigned: 0.50

  scenario_E_inference_outpaces_training:
    name: "Inference demand outpaces training (chip-mix shift)"
    transmission: "Market shifts toward inference-optimised silicon (Trainium inference, MTIA v2/3, Groq); B300/Rubin training demand softens"
    affected_commitment_ids: [openai_broadcom_10gw_asic, meta_hyperion_prometheus]
    gw_delta_2030: 0.0           # same power, different chips
    chip_mix_shift_notes: "More inference-optimised silicon; less B300/Rubin training demand. Bullish for custom ASIC, bearish for NVIDIA monopoly rents."
    capex_delta_usd_b: -20.0     # inference chips slightly cheaper
    h100e_delta_million: -5.0    # H100e is a training metric; inference-optimised chips have lower H100e but higher inference throughput
    counterparty_exposure_affected: [NVIDIA, Broadcom, Meta, Amazon, Google]
    probability_assigned: 0.55
    note: "Highest-probability scenario. Already underway."

  scenario_F_lab_revenue_rpo_stress:
    name: "Lab revenue / RPO stress"
    transmission: "Frontier-model revenue or API/inference gross margins disappoint; labs defer, renegotiate, or underutilize take-or-pay commitments"
    affected_commitment_ids: [openai_stargate_aggregate, anthropic_aws_2026_04_20, meta_nebius_2026_03_16]
    affected_neocloud_ids: [CoreWeave, Nebius, Applied_Digital, Crusoe]
    gw_delta_2030: -2.5
    capex_delta_usd_b_range: [-120.0, -80.0]
    rpo_at_risk_usd_b_range: [100.0, 175.0]
    h100e_delta_million: -5.0
    counterparty_exposure_affected: [Oracle, OpenAI, CoreWeave, Microsoft, Nebius, Meta, Anthropic, AWS, Google]
    probability_assigned: 0.15
    monte_carlo_rule: "If this state fires outside systemic stress, raise scenario B probability to 0.60 in that draw."

  upside_U1_grid_interconnection_acceleration:
    name: "Grid / interconnection acceleration"
    transmission: "Permitting reform, connect-and-manage rules, conditional interconnection, behind-the-meter generation, utility fast-track tariffs"
    gw_delta_2030: 2.0
    capex_delta_usd_b_range: [50.0, 70.0]
    h100e_delta_million: 4.0
    probability_assigned: 0.20

  upside_U2_neocloud_financing_open:
    name: "Neocloud financing remains open / spreads tighten"
    transmission: "Private-credit appetite remains strong; RPO-backed SPVs price tighter; marginal neocloud projects finance earlier"
    gw_delta_2030: 1.5
    capex_delta_usd_b_range: [40.0, 60.0]
    h100e_delta_million: 3.0
    probability_assigned: 0.20

  upside_U3_T4_announced_site_over_realization:
    name: "T4 announced-site over-realization"
    transmission: "Named-site T4 projects with capex-secured sponsors reach COD faster than tier-default assumptions"
    gw_delta_2030_range: [2.0, 2.5]
    monte_carlo_gw_delta_2030: 2.25
    capex_delta_usd_b_range: [60.0, 90.0]
    h100e_delta_million: 5.0
    probability_assigned: 0.15

  upside_U4_silicon_acceleration:
    name: "Silicon acceleration / better H100e per watt"
    transmission: "Rubin / Trainium / TPU roadmap arrives early or density per watt exceeds base curve"
    gw_delta_2030: 0.0
    h100e_delta_million_range: [8.0, 12.0]
    monte_carlo_h100e_delta_million: 10.0
    capex_delta_usd_b: 0.0
    probability_assigned: 0.25
    note: "H100e-only upside; does not move the facility-power Monte Carlo."
