# ---------------------------------------------------------------------------
# anatomy_named_projects.yaml
#
# Project-level anchors for the unit-economics decomposition. Where named AI
# campus deals have publicly disclosed dollar/MW splits, this file captures
# the verbatim figures with primary citations. These are the empirical
# checkpoints that the bottoms-up layer ranges in anatomy_layer_costs.yaml
# must reconcile to.
#
# Each row carries:
#   - operator + tenant + location
#   - capacity (MW or GW)
#   - acreage where disclosed
#   - capex_usd_b (split into landlord_share / tenant_share / power_share)
#   - implied_usd_m_per_mw (with explicit basis declaration)
#   - what's included / excluded
#   - primary_sources[]
#   - evidence_tier
#
# Companion to anatomy_layer_costs.yaml (bottoms-up) and
# forecaster_capex_comparison.yaml (cross-source). This file is the "real
# project disclosures" anchor class.
#
# Data cutoff: 2026-04-27
# ---------------------------------------------------------------------------

metadata:
  schema_version: "2026-04-27"
  data_cutoff: "2026-04-27"
  reference_vintage: "2025-2026"

