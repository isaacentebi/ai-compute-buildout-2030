    note: "Tight reconciliation - Crusoe BTM gas amortizes through lease, not landed in shell capex"

  - anchor: meta_hyperion_blue_owl
    disclosed_usd_b_per_gw: 13.5
    disclosed_basis: shell_me_only_no_it
    layer_costs_facility_only_central_no_btm: 13.15
    delta_pct: 3
    note: "Direct anchor; matches our facility-only-no-IT central case"

  - anchor: aep_ohio_sb_energy_piketon
    disclosed_usd_k_per_mw_transmission_only: 420
    layer_costs_grid_constrained_central: 2150
