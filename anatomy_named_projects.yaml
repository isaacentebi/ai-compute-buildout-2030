reconciliation_to_layer_costs:
  - anchor: crusoe_stargate_abilene
    disclosed_usd_m_per_mw: 12.5
    disclosed_basis: shell_power_cooling_no_it
    layer_costs_facility_only_central_no_btm: 13.15
