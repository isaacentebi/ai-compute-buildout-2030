            url: "https://www.constructelements.com/post/cost-to-build-modern-data-center-2026"
            retrieval_date: "2026-04-27"
        notes: |
          Includes earthwork, mass grading, stormwater detention, utility
          trenching, access roads, perimeter, dry/wet utility duct banks. Heavy
          fill / rock / extended utility tie-ins push to upper bound.

      - sub_id: building_shell
        label: "Building shell (tilt-up concrete / structural steel hybrid)"
        cost_usd_m_per_mw_low: 1.4
        cost_usd_m_per_mw_high: 2.5
        cost_usd_m_per_mw_central: 1.9
        basis: facility_mw
        vintage: 2025
        evidence_tier: T3
        derivation: "7,000 sq ft/MW × $200-350/sq ft Tier-2"
        density_change_note: |
          AI density compressed gross sq ft/MW from ~10-12k (2019) to ~6-8k
          (2025-26 AI), partially offsetting unit-cost inflation.
        primary_sources:
          - publisher: "DPR Construction"
            url: "https://www.dpr.com/media/blog/digital-realty-tilt-up"
            retrieval_date: "2026-04-27"
            note: "Tilt-up panel install rate 8-10/day, ~45 min/panel"
          - publisher: "Datacentre Magazine"
            url: "https://datacentremagazine.com/articles/the-role-of-steel-in-todays-data-centre-industry"
            retrieval_date: "2026-04-27"
            note: "Hyperscale builds ~20,000 tonnes steel/facility, 30-40 lb/sq ft"

      - sub_id: base_fitout
        label: "Base fit-out (raised floor, fire suppression, BMS, DCIM, security)"
        cost_usd_m_per_mw_low: 1.5
        cost_usd_m_per_mw_high: 2.5
        cost_usd_m_per_mw_central: 2.0
        basis: facility_mw
        vintage: 2025
        evidence_tier: T3
        derivation: "20-25% of total construction capex; $100-200/sq ft"
        primary_sources:
          - publisher: "Cushman & Wakefield"
            url: "https://www.cushmanwakefield.com/en/united-states/insights/data-center-development-cost-guide"
            retrieval_date: "2026-04-27"
          - publisher: "Construct Elements"
            url: "https://www.constructelements.com/post/cost-to-build-modern-data-center-2026"
            retrieval_date: "2026-04-27"

      - sub_id: ai_fitout_delta
        label: "AI fit-out delta (high-density busway, in-row CDU, leak det, advanced BMS)"
        cost_usd_m_per_mw_low: 1.0
        cost_usd_m_per_mw_high: 3.0
        cost_usd_m_per_mw_central: 1.8
        basis: facility_mw
        vintage: 2026
        evidence_tier: T3
        primary_sources:
          - publisher: "Turner & Townsend"
            url: "https://reports.turnerandtownsend.com/data-centre-construction-cost-index-2025/data-centre-cost-trends"
            retrieval_date: "2026-04-27"
            note: "AI-DC cost premium 7-10% above air-cooled cloud builds"

    inflation_flags_2024_2026:
      - "Turner Building Cost Index +5-6%/yr through 2025"
      - "ENR Building Cost Index +4.2% / Construction Cost Index +3.6% full-year 2025"
      - "Turner & Townsend DC Cost Index +5.5%/yr 2025 (vs +9.0% 2024)"
      - "AGC: ~439k construction worker shortage; 80%+ firms can't fill craft roles"
      - "Loudoun DC-zoned land +59% in single year (2024 -> 2025)"
      - "DC trades wage premium 25-30% (electricians, pipefitters, controls)"

    layer_construction_cycle_notes: |
      Long pole has shifted from civil/structural to transformer + switchgear
      lead times (now up to 4 yrs for large MV transformers vs ~40 weeks
      pre-2020) plus grid interconnection studies. PJM/ERCOT now require
      20% non-refundable interconnection deposits = $50-200M for 1 GW.

