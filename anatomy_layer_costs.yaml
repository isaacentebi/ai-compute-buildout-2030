        cost_usd_m_per_mw_low: 0.30
        cost_usd_m_per_mw_high: 1.20
        cost_usd_m_per_mw_central: 0.70
        basis: facility_mw
        vintage: 2025
        evidence_tier: T3
        primary_sources:
