# ---------------------------------------------------------------------------
# anatomy_layer_costs.yaml
#
# Per-layer / per-sub-component cost decomposition for one AI facility GW
# (2026 vintage). Feeds the rev-4 §2 "Anatomy of one AI facility gigawatt"
# section. Companion to compute_commitments_overlay.yaml, which tracks the
# horizon side; this file tracks the unit-economics side.
#
# Each sub-component row carries:
#   - cost_usd_m_per_mw_{low,high,central}
#   - basis (facility_mw | it_load_mw | server_power_mw)
#   - vintage (year the cost figure represents)
#   - evidence_tier (T1-T6, mirroring the horizon framework)
#   - primary_sources[] with publisher + url + retrieval_date
#   - inflation_flag (notable 2024->2026 cost moves)
#   - notes (caveats, derivation, hearsay flags)
#
# Six physical layers + one cross-cutting basis-conventions block:
#   1. shell_civil_land
#   2. cooling
#   3. power_infrastructure
#   4. networking_fabric
#   5. accelerator_server_bom
#   6. grid_interconnect
#
# Companion files:
#   anatomy_layer_costs.csv               - flat per-row table
#   anatomy_named_projects.yaml           - project-level disclosed capex anchors
#   forecaster_capex_comparison.yaml      - cross-forecaster $/GW reconciliation
#
# Build / audit hook (TODO): extend audit_totals.py with --basis anatomy mode
# to validate sum(layer_central) reconciles to total_facility_gw_central.
#
# Data cutoff: 2026-04-27
# ---------------------------------------------------------------------------

metadata:
  schema_version: "2026-04-27"
  data_cutoff: "2026-04-27"
  reference_vintage: 2026
  basis_default: facility_mw
  geography_scope: "Western (US-led) hyperscale AI training campus"
  reference_platform: "NVIDIA GB200/GB300 NVL72 baseline; ~120 kW/rack"
  reference_pue: 1.15
  author: anatomy-research-pipeline
  research_inputs:
    - research/01_forecasters.md
    - research/02_power.md
    - research/03_cooling.md
    - research/04_shell_land.md
    - research/05_networking.md
    - research/06_accelerator.md
    - research/07_grid.md
    - research/08_crusoe.md

  evidence_tier_definitions: |
    T1 - Operationally verified at named hyperscale site (10-K disclosure or
         vendor-confirmed installation cost on a real campus).
    T2 - Vendor list price or distributor quote for in-volume product, current
         year, with named vendor (Schneider, Vertiv, GE Vernova, etc.).
    T3 - Independent industry-tracker average (Dell'Oro, JLL, Cushman, CBRE,
         Turner & Townsend, Wood Mackenzie). Multi-source convergent.
    T4 - Single-source analyst estimate (SemiAnalysis, Bernstein, Goldman,
         Morgan Stanley, Crehan, 650 Group) - useful but not corroborated.
    T5 - Inferred from MEP-share or component-arithmetic. Construct, not
         disclosure.
    T6 - Hearsay / trade press without primary citation. Use as boundary
         only.

  basis_definitions:
    facility_mw: |
      Total facility power including IT load + cooling + lighting + losses.
      Matches Epoch AI's MW convention. Primary basis for this paper.
    it_load_mw: |
      IT (server-power) MW only. Equals facility_mw / PUE. Used by JLL,
      Cushman, most colocation analysts.
    server_power_mw: |
      Same as it_load_mw in modern usage; some forecasters (Epoch headline,
      Nvidia/Jensen) use this as the denominator on $/GW headlines.

# ============================================================================
# CROSS-CUTTING: BASIS CONVENTIONS CHEAT SHEET
# ----------------------------------------------------------------------------
# Apparent disagreements between forecasters of 3-5x in $/GW almost always
# disappear once you align on which row each is using.
# ============================================================================

basis_conventions:
  - convention_id: server_power_gw_all_in
    label: "Per server-power GW, full all-in (IT + infra + power)"
    typical_usd_b_per_gw_low: 40
    typical_usd_b_per_gw_high: 55
    used_by:
      - Epoch AI (headline $44B server-GW figure)
      - "NVIDIA / Jensen Huang ($50-60B/GW 'AI factory')"
      - "Stargate aggregate ($500B / 10 GW = $50B/GW)"
    note: "Smaller denominator (IT only); largest $/GW number."

  - convention_id: facility_power_gw_all_in
    label: "Per facility-power GW, full all-in"
    typical_usd_b_per_gw_low: 25
    typical_usd_b_per_gw_high: 35
    used_by:
      - "Epoch AI facility figure ($29-30B)"
      - "McKinsey (~$33B derived)"
      - "Bernstein (~$28B if PUE-adjusted from $35B IT-load)"
      - "THIS PAPER: $23-30B/GW Western 2026 horizon"
    note: |
      Larger denominator (facility power); paper sits at the LOW end of this
      band - defensible only if (a) IT hardware included, (b) BTM generation
      excluded, (c) custom-silicon mix material.

  - convention_id: shell_me_only_no_it
    label: "Per IT-load GW, shell + M&E only, IT excluded"
    typical_usd_b_per_gw_low: 10
    typical_usd_b_per_gw_high: 15
    used_by:
      - "Cushman & Wakefield ($11.7M/MW avg critical-load)"
      - "JLL ($11.3M/MW shell-and-core 2026)"
      - "Meta Hyperion JV ($27B / 2 GW = $13.5B/GW shell-only)"
      - "Crusoe Abilene ($15B / 1.2 GW = $12.5M/MW shell+power+cooling)"
    note: "OFCI / tenant equipment excluded. Cleanest disclosed anchor class."

  - convention_id: ai_fitout_delta_only
    label: "AI fit-out delta over standard hyperscale (incremental)"
    typical_usd_b_per_gw_low: 20
    typical_usd_b_per_gw_high: 30
    used_by:
      - "JLL (+$25M/MW AI fit-out)"
      - "ConstructElements (+$20M/MW)"
    note: "Captures liquid cooling, dense distribution, monitoring, controls."

# ============================================================================
# LAYER 1 - SHELL + CIVIL + LAND
# ============================================================================

layers:
  - layer_id: shell_civil_land
    layer_label: "Building shell + civil + land + base/AI fit-out"
    layer_short: "Shell"
    layer_share_of_facility_capex_pct: [40, 55]
    layer_total_usd_m_per_mw_low: 4.4
    layer_total_usd_m_per_mw_high: 9.7
    layer_total_usd_m_per_mw_central: 6.5
    layer_basis: facility_mw
    layer_vintage: 2026
    layer_geography_default: "Tier-2/3 US (TX/OH/MS/IA/WI)"
    layer_geography_alternates:
      tier_1_nova: { low: 5.5, high: 11.0 }
      tier_4_rural: { low: 4.0, high: 6.0 }
    layer_construction_cycle_months_typical: [30, 48]
    layer_construction_cycle_months_record_fast: 12
    layer_construction_cycle_months_legacy_2019: [24, 30]

    sub_components:
      - sub_id: land_tier_1_nova
        label: "Land - Tier 1 Northern Virginia (Loudoun + PWC)"
        cost_usd_m_per_mw_low: 0.30
        cost_usd_m_per_mw_high: 1.50
        cost_usd_m_per_mw_central: 0.80
        basis: facility_mw
        vintage: 2025
        evidence_tier: T1
        count_in_layer_sum: false  # alternate to land_tier_2_3 (representative Tier-2/3 default)
        alternate_to: land_tier_2_3
        derivation: "5-8 ac/100 MW × $3-6M/ac"
        primary_sources:
          - publisher: "Loudoun Now"
            url: "https://www.loudounnow.com/news/loudoun-land-data-center-values-soar-while-home-assessments-hold-steady/article_d7977ab6-f33b-4dc2-8203-d53bc9a8ebc4.html"
            retrieval_date: "2026-04-27"
            note: "Loudoun avg DC-zoned land 2025 = $3.76M/acre"
          - publisher: "Northern Virginia Magazine"
            url: "https://northernvirginiamag.com/news/2025/11/04/amazon-buys-northern-virginia-data-center-site-for-record-700-million/"
            retrieval_date: "2026-04-27"
            note: "Amazon NoVA Nov 2025 = $700M / ~189 ac = $3.7M/acre"
          - publisher: "Loudoun Now"
            url: "https://www.loudounnow.com/business/data-center-sale-sets-new-loudoun-price-record/article_d392a250-e672-46c2-b2d2-f0ad3424a100.html"
            retrieval_date: "2026-04-27"
            note: "SDC Capital Leesburg Q4'25 record: $615M for 97 acres = $6.3M/acre"

      - sub_id: land_tier_2_3
        label: "Land - Tier 2/3 (PHX/ATL/OH/TX/AZ)"
        cost_usd_m_per_mw_low: 0.05
        cost_usd_m_per_mw_high: 0.40
        cost_usd_m_per_mw_central: 0.15
        basis: facility_mw
        vintage: 2025
        evidence_tier: T1
        derivation: "5-10 ac/100 MW × $0.2-1.7M/ac"
        primary_sources:
          - publisher: "Phoenix Metro Home Search"
            url: "https://www.phoenixmetrohomesearch.com/blog/global-data-center-giant-pays-300-million-for-land-in-east-valley"
            retrieval_date: "2026-04-27"
            note: "NTT Mesa: $300M / 174 ac = $1.7M/acre (record)"
          - publisher: "Bisnow / NAMC Atlanta"
            url: "https://namcatlanta.org/2024/05/31/microsoft-grabs-another-160-acres-south-of-atlanta-for-data-centers/"
            retrieval_date: "2026-04-27"
            note: "Microsoft Douglas County 2021: $148k/acre"

      - sub_id: land_tier_4_rural
        label: "Land - Tier 4 rural (LA/MS/Mt Pleasant/Iowa)"
        cost_usd_m_per_mw_low: 0.01
        cost_usd_m_per_mw_high: 0.075
        cost_usd_m_per_mw_central: 0.03
        basis: facility_mw
        vintage: 2025
        evidence_tier: T1
        count_in_layer_sum: false  # alternate to land_tier_2_3 (representative Tier-2/3 default)
        alternate_to: land_tier_2_3
        derivation: "Rural farmland $150-750k/ac × 7-10 ac/100 MW; Hyperion-class < $30M total land vs $27B JV"
        primary_sources:
          - publisher: "Urban Milwaukee"
            url: "https://urbanmilwaukee.com/2024/07/30/microsoft-buys-more-land-in-mount-pleasant-for-data-center/"
            retrieval_date: "2026-04-27"
            note: "Microsoft Mt Pleasant: $225.8M / 1,363 ac = $165,700/acre"
          - publisher: "Cushman & Wakefield"
            url: "https://www.cushmanwakefield.com/en/united-states/insights/data-center-development-cost-guide"
            retrieval_date: "2026-04-27"
            note: "2024 weighted-average DC land sale price = $244,000/acre"

      - sub_id: site_civil_utilities_permitting
