      basis: rack_complete_in_rack_BOM
      adopted_in_paper: rev-4 2026-04-27
      derivation: |
        Bottoms-up: 415-440 GB200/GB300-class chips per facility-MW at ~$45k
        all-in chip-plus-rack-share = $19-22B/GW for an all-NVIDIA 2026 build.
        Custom-silicon-heavy hyperscaler builds (Trainium, TPU, MTIA, Maia at
        materially lower $/H100e) land at $15-18B/GW. The Western 2026 horizon
        blends both (Microsoft / Amazon / Google / Meta custom-silicon-heavy
        at 40-50%; OpenAI / xAI / neoclouds at all-NVIDIA), giving a blended
        central of $19.5M per facility-MW = $19.5B/GW for the rack-complete
        accelerator+server BOM.
      supersedes_prior_framing: |
        Earlier paper framings used $17-20M per facility-MW for accelerators
        (rev-3 footnote at Figure 8A). That figure under-counted in-rack
        non-accelerator silicon (Grace, NVSwitch, NICs) and AI networking.
        Rev-4 standardizes on rack-complete BOM at $19.5M/MW central.

